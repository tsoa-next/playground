name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-suite:
    name: Full Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run full example suite
        shell: bash
        run: |
          set -euo pipefail
          output_file="$(mktemp)"
          npm test | tee "$output_file"

          if grep -Eq '(^|[[:space:]])[1-9][0-9]* skipped([[:space:]]|$)' "$output_file"; then
            echo "Skipped tests detected in the example suite."
            exit 1
          fi

      - name: Build generated playground
        run: npm run build
